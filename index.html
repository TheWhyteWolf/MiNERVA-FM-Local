<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>MiNERVA RADIO — CRT</title>
<style>
  :root { --bezel: #161310; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; background: #000; overflow: hidden;
    font-family: "DejaVu Sans Mono", "Liberation Mono", Menlo, Consolas, monospace;
    cursor: default;
  }
  /* Ambient room glow behind the tube */
  #stage {
    position: fixed; inset: 0; display: grid; place-items: center;
    background: radial-gradient(ellipse at center, #0a0d0a 0%, #000 70%);
  }
  /* The physical set: bezel + tube */
  #set {
    position: relative; width: min(96vw, 127vh); aspect-ratio: 4 / 3;
    border-radius: 3.2% / 4.3%;
    background: linear-gradient(155deg, #2a2620, #100e0b 60%, #050403);
    padding: 2.6%;
    box-shadow:
      inset 0 0 4px 2px rgba(255,255,255,.06),
      inset 0 0 40px 10px rgba(0,0,0,.85),
      0 30px 80px -20px rgba(0,0,0,.9),
      0 0 120px -10px rgba(120,180,90,.12);
  }
  #crt {
    display: block; width: 100%; height: 100%;
    border-radius: 2% / 2.6%;
    background: #000;
    image-rendering: pixelated; image-rendering: optimizeSpeed;
  }
  /* Soft outer glass reflection */
  #set::after {
    content: ""; position: absolute; inset: 2.6%;
    border-radius: 2% / 2.6%; pointer-events: none;
    background: linear-gradient(150deg, rgba(255,255,255,.07), rgba(255,255,255,0) 22%, rgba(255,255,255,0) 78%, rgba(255,255,255,.03));
    mix-blend-mode: screen;
  }
  #power {
    position: absolute; inset: 0; display: grid; place-items: center;
    color: #6f8f5a; letter-spacing: .25em; text-align: center;
    background: #000; border-radius: 2% / 2.6%;
    cursor: pointer; z-index: 5; user-select: none;
    transition: opacity .5s ease;
  }
  #power .blink { animation: blink 1.2s steps(2,end) infinite; }
  @keyframes blink { 50% { opacity: .15; } }
  #power small { display:block; margin-top: 1.2em; font-size: .62em; color:#4f6a40; letter-spacing:.18em; }
  #hint {
    position: fixed; left: 50%; bottom: 10px; transform: translateX(-50%);
    color: #3c5430; font-size: 11px; letter-spacing: .15em; z-index: 6;
    opacity: .6; pointer-events: none;
  }
</style>
</head>
<body>
  <div id="stage">
    <div id="set">
      <canvas id="crt" width="1280" height="960"></canvas>
      <div id="power">
        <div>
          <div class="blink">▶ POWER ON</div>
          <small id="powerSub">MiNERVA RADIO &nbsp;·&nbsp; click to start the tube</small>
        </div>
      </div>
    </div>
  </div>
  <div id="hint">[N]ext [P]rev [Space] pause [O] open folder &nbsp;·&nbsp; [M]ono [S]canlines [&#8593;/&#8595;] vol &nbsp;·&nbsp; or drop files</div>

<!-- SID engine (patched to share our AudioContext + expose its node) -->
<script src="assets/engines/jsSID.js"></script>
<script>
"use strict";
/* ============================================================================
   MiNERVA RADIO — CRT emulator
   Faithful re-creation of the minerva-radio.sh look & behaviour, post-processed
   to feel like it's running inside cool-retro-term.
   ========================================================================== */

/* ---- The ticker messages (straight from ticker.sh) ---------------------- */
const TICKER_MESSAGES = [
  "[ WELCOME TO MiNERVA RADIO] Retro game music from across the ages",
  "Birds aren't real. Seriously though. Have you ever seen a baby pigeon? I think not! They're spying on you. Just you",
  "I'm ashamed of what I did for a klondike bar... ",
  "[ MiNERVA RADIO ] Streaming SID, SPC, VGM, MOD and more",
  "PUBLIC ANNOUNCEMENT: Seeding is sharing and sharing is caring",
  "BE PATIENT! Viewers found using antipatience language will be scoffed at",
  "When was the last time you told your mother you loved her?",
  "Help! I'm trapped in a radio!",
  "[MiNERVA RADIO] song requests in general chat! Anything that get's 25+ hearts will be considered. SNES and older only!",
  "Anyway, back to the bird thing. I reckon they're charging by standing on the power lines, that's why they never get fried.",
  "To download is human, to share is DiVINE",
  "If we're not meant to have midnight snacks, why is there a light in the fridge?",
  "Your numbers this week are 05-17-27-29-35 / 07",
];

/* ---- vis colour schemes (the radio's SCHEMES list), as bar gradients ----- *
 * low-amplitude colour first → high-amplitude colour last.                   */
const VIS_SCHEMES = {
  gameboy:        ["#0f380f", "#306230", "#8bac0f", "#9bbc0f"],
  gameboy_pocket: ["#2b2b22", "#4d533c", "#8b956d", "#c4cfa1"],
  bbc_micro:      ["#0000ff", "#00ff00", "#ffff00", "#ff0000", "#ffffff"],
  pico8:          ["#1d2b53", "#7e2553", "#ff004d", "#ffa300", "#fff1e8"],
  cga:            ["#000000", "#55ffff", "#ff55ff", "#ffffff"],
  nes:            ["#0000fc", "#0078f8", "#00b800", "#f8b800", "#f83800", "#fcfcfc"],
  minerva:        ["#2a0a00", "#7a2a00", "#ff7a00", "#ffc24d", "#fff3c0"],
  c64:            ["#352879", "#6c5eb5", "#6abfc6", "#b8c76f", "#ffffff"],
  zx_spectrum:    ["#0000d7", "#d70000", "#d700d7", "#00d700", "#d7d700", "#ffffff"],
};
const SCHEME_NAMES = Object.keys(VIS_SCHEMES);
/* the radio's spectrum characters */
const VIS_CHARS = ["#","|",":","+","*","=","!",">","%","@","^","~","-","o","x"];

/* ---- ANSI-ish palette for the now-playing panel ------------------------- */
const ANSI = {
  blue:   "#5b9bff",
  yellow: "#ffd633",
  green:  "#54ff7a",
  magenta:"#ff7bd6",
  red:    "#ff5a5a",
  cyan:   "#5cf7ff",
  fg:     "#cfe8cf",   // default foreground (glows under bloom)
  dim:    "#5f7a52",
};

/* ---- CRT effect parameters (lifted from cool-retro-term defaults) -------- */
const CRT = {
  curvature: 0.10,     // barrel distortion
  scanline:  0.30,     // scanline darkening
  mask:      0.22,     // aperture-grille triad
  rgbShift:  0.0011,   // chroma separation (uv units)
  bloom:     0.55,     // glow of bright pixels
  flicker:   0.05,
  noise:     0.07,
  glowLine:  0.04,     // moving horizontal sync band
  vignette:  0.32,
  brightness:1.18,
  mono:      false,    // colour CRT by default; [M] toggles amber phosphor
  monoTint:  [1.0, 0.55, 0.12],   // amber #ff8100-ish
  power:     0,        // tube turn-on progress (0..1), animated on POWER ON
};

const DEBUG = false;   // set true for verbose audio/engine logs in the console

/* ============================================================================
   CONTENT CANVAS  — draw the three panes at a low virtual resolution
   ========================================================================== */
const VW = 640, VH = 480;                  // virtual tube resolution (4:3)
const content = document.createElement("canvas");
content.width = VW; content.height = VH;
const cx = content.getContext("2d", { alpha: false });

const CELL_W = 8, CELL_H = 12;             // terminal cell
const COLS = Math.floor(VW / CELL_W);      // 80
const FONT = '12px "DejaVu Sans Mono", "Liberation Mono", monospace';

const PANE_TOP_ROWS = 12;                  // now-playing pane height (radio: -y 12)
const PANE_TICKER_ROWS = 1;
const VIS_TOP = PANE_TOP_ROWS * CELL_H;
const VIS_BOTTOM = VH - PANE_TICKER_ROWS * CELL_H;

function txt(col, row, s, color) {
  cx.fillStyle = color;
  cx.fillText(s, col * CELL_W, row * CELL_H + CELL_H - 2);
}

/* draw the "[ NOW PLAYING ] [SOURCE]" header with multiple colours */
function drawNowPlaying(state) {
  cx.font = FONT;
  cx.textBaseline = "alphabetic";
  let row = 0;
  // header
  cx.fillStyle = ANSI.blue; cx.fillText("[ NOW PLAYING ]", 0, CELL_H - 2);
  cx.fillStyle = ANSI.yellow; cx.fillText("[" + state.source + "]", 16 * CELL_W, CELL_H - 2);
  row = 2;
  const line = (label, value, lc) => {
    cx.fillStyle = lc || ANSI.green; cx.fillText(label, 0, row * CELL_H + CELL_H - 2);
    cx.fillStyle = ANSI.fg; cx.fillText(value, (label.length + 1) * CELL_W, row * CELL_H + CELL_H - 2);
    row++;
  };
  line("ID:", state.id);
  if (state.platform) line("System:", state.platform);
  line("Game:", clip(state.game, COLS - 8));
  line("Track:", clip(state.track, COLS - 8));
  line("Colour:", state.scheme);
  if (state.queue > 0) line("Queue:", state.queue + " track(s) waiting", ANSI.magenta);
  // separator
  cx.fillStyle = ANSI.dim;
  cx.fillText("-".repeat(COLS), 0, (PANE_TOP_ROWS - 1) * CELL_H + CELL_H - 2);
}
function clip(s, n) { s = String(s); return s.length > n ? s.slice(0, n - 1) + "…" : s; }

/* spectrum visualiser — vertical stacks of the track's char, palette-coloured */
const SPEC_COLS = 56;
function drawVisualiser(freq, scheme, ch) {
  const pal = VIS_SCHEMES[scheme] || VIS_SCHEMES.minerva;
  const areaH = VIS_BOTTOM - VIS_TOP;
  const rows = Math.floor(areaH / CELL_H);
  const colW = VW / SPEC_COLS;
  cx.font = FONT;
  const bins = freq.length;
  for (let c = 0; c < SPEC_COLS; c++) {
    // logarithmic-ish bin mapping so bass doesn't dominate
    const t = c / SPEC_COLS;
    const bin = Math.min(bins - 1, Math.floor(Math.pow(t, 1.7) * bins));
    let v = freq[bin] / 255;
    v = Math.pow(v, 0.85);
    const h = Math.max(0, Math.round(v * rows));
    const x = Math.round(c * colW + colW / 2 - CELL_W / 2);
    for (let r = 0; r < h; r++) {
      const frac = r / Math.max(1, rows - 1);
      cx.fillStyle = pal[Math.min(pal.length - 1, Math.floor(frac * pal.length))];
      const y = VIS_BOTTOM - r * CELL_H - 2;
      cx.fillText(ch, x, y);
    }
  }
}

/* scrolling ticker (port of ticker.sh: repeat block, slide one col per tick) */
const ticker = {
  msg: "", colour: ANSI.yellow, offset: 0, full: "", msgLen: 0,
  nextAt: 0, stepAt: 0,
  colours: [ANSI.yellow, ANSI.green, ANSI.cyan, ANSI.magenta, ANSI.red],
  reroll(now) {
    this.msg = TICKER_MESSAGES[(Math.random() * TICKER_MESSAGES.length) | 0];
    this.colour = this.colours[(Math.random() * this.colours.length) | 0];
    const base = this.msg + "    *** ";
    this.msgLen = base.length;
    this.full = base.repeat(30);
    this.offset = 0;
    this.nextAt = now + 60000;     // new message every 60s, like the script
  },
  update(now) {
    if (now >= this.nextAt) this.reroll(now);
    if (now >= this.stepAt) { this.offset = (this.offset + 1) % this.msgLen; this.stepAt = now + 120; }
  },
  draw() {
    const row = COLS;
    const slice = this.full.substr(this.offset, COLS);
    cx.font = FONT;
    cx.fillStyle = this.colour;
    cx.fillText(slice, 0, VH - 2);
  }
};

/* ============================================================================
   WEBGL CRT POST-PROCESS  (single pass; falls back to 2D blit on failure)
   ========================================================================== */
const out = document.getElementById("crt");
let glOK = false, gl, prog, locs, tex, quadBuf;

const VERT = `attribute vec2 p; varying vec2 vUv;
void main(){ vUv = vec2(p.x*0.5+0.5, 0.5-p.y*0.5); gl_Position = vec4(p,0.0,1.0); }`;

const FRAG = `
precision highp float;
varying vec2 vUv;
uniform sampler2D uTex;
uniform vec2  uRes;     // virtual resolution (for scanlines)
uniform float uTime;
uniform float uCurv, uScan, uMask, uRgb, uBloom, uFlicker, uNoise, uGlow, uVig, uBright, uMono;
uniform vec3  uTint;
uniform float uPower;

float rand(vec2 c){ return fract(sin(dot(c, vec2(12.9898,78.233)))*43758.5453); }

vec2 curve(vec2 uv){
  uv = uv*2.0 - 1.0;
  vec2 o = abs(uv.yx) * (0.45*uCurv);
  uv = uv + uv*o*o;
  return uv*0.5 + 0.5;
}

void main(){
  vec2 uv = curve(vUv);
  if(uv.x<0.0||uv.x>1.0||uv.y<0.0||uv.y>1.0){ gl_FragColor=vec4(0.0,0.0,0.0,1.0); return; }

  // chroma / rgb shift
  vec3 col;
  col.r = texture2D(uTex, vec2(uv.x + uRgb, uv.y)).r;
  col.g = texture2D(uTex, uv).g;
  col.b = texture2D(uTex, vec2(uv.x - uRgb, uv.y)).b;

  // cheap bloom: 8-tap blur of bright areas
  vec3 bloom = vec3(0.0);
  float bs = 1.6/uRes.x;
  bloom += texture2D(uTex, uv + vec2( bs, 0)).rgb;
  bloom += texture2D(uTex, uv + vec2(-bs, 0)).rgb;
  bloom += texture2D(uTex, uv + vec2(0,  bs*1.3)).rgb;
  bloom += texture2D(uTex, uv + vec2(0, -bs*1.3)).rgb;
  bloom += texture2D(uTex, uv + vec2( bs, bs)).rgb;
  bloom += texture2D(uTex, uv + vec2(-bs,-bs)).rgb;
  bloom += texture2D(uTex, uv + vec2( bs*2.0, 0)).rgb;
  bloom += texture2D(uTex, uv + vec2(-bs*2.0, 0)).rgb;
  bloom *= 0.125;
  col += bloom*bloom * uBloom;

  // monochrome amber phosphor option
  if(uMono > 0.5){
    float lum = dot(col, vec3(0.299,0.587,0.114));
    col = uTint * lum;
  }

  // scanlines
  float sl = sin(uv.y * uRes.y * 3.14159265);
  col *= 1.0 - uScan*(0.5 + 0.5*sl)*0.6;

  // aperture-grille triad mask
  float m = mod(gl_FragCoord.x, 3.0);
  vec3 mask = vec3(1.0 - uMask);
  if(m < 1.0) mask.r = 1.0; else if(m < 2.0) mask.g = 1.0; else mask.b = 1.0;
  col *= mask;

  // moving horizontal sync glow band
  float band = fract(uv.y*0.7 - uTime*0.08);
  col += uGlow * smoothstep(0.96, 1.0, band) * vec3(0.6,0.8,0.6);

  // flicker + static noise
  col *= 1.0 - uFlicker*(rand(vec2(uTime,1.0))-0.5);
  col += (rand(uv*uRes + uTime) - 0.5) * uNoise;

  // vignette
  vec2 vc = uv - 0.5;
  col *= 1.0 - uVig*dot(vc,vc)*2.2;

  col *= uBright;

  // ---- CRT power-on: white dot -> horizontal line -> open vertically ----
  if(uPower < 1.0){
    vec2 pp = uv*2.0 - 1.0;                            // -1..1 across the tube
    float ox = smoothstep(0.0, 0.40, uPower);          // width opens first (dot -> line)
    float oy = smoothstep(0.42, 1.0, uPower);          // height opens after (line -> fill)
    float effOy = max(oy, 0.0045);                     // hold one bright scanline in phase 1
    float mx = 1.0 - smoothstep(ox,    ox + 0.012,    abs(pp.x));
    float my = 1.0 - smoothstep(effOy, effOy + 0.010, abs(pp.y));
    float lit = mx * my;
    float hot = 1.0 - smoothstep(0.0, 0.55, oy);       // overexposed white early, settles to image
    vec3 beam = mix(col, vec3(1.15), hot * 0.9);
    col = beam * lit;
    col += lit * smoothstep(effOy, effOy * 0.25, abs(pp.y)) * hot * vec3(0.45, 0.6, 0.45);
  }

  gl_FragColor = vec4(col, 1.0);
}`;

function compile(type, src){
  const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
function initGL(){
  gl = out.getContext("webgl", { antialias:false, preserveDrawingBuffer:false })
    || out.getContext("experimental-webgl");
  if(!gl) return false;
  prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, VERT));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FRAG));
  gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(prog));
  gl.useProgram(prog);
  quadBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const p = gl.getAttribLocation(prog, "p");
  gl.enableVertexAttribArray(p); gl.vertexAttribPointer(p, 2, gl.FLOAT, false, 0, 0);
  tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
  locs = {};
  ["uTex","uRes","uTime","uCurv","uScan","uMask","uRgb","uBloom","uFlicker","uNoise","uGlow","uVig","uBright","uMono","uTint","uPower"]
    .forEach(n => locs[n] = gl.getUniformLocation(prog, n));
  return true;
}
function drawGL(time){
  gl.viewport(0,0,out.width,out.height);
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGB, gl.RGB, gl.UNSIGNED_BYTE, content);
  gl.uniform1i(locs.uTex, 0);
  gl.uniform2f(locs.uRes, VW, VH);
  gl.uniform1f(locs.uTime, time/1000);
  gl.uniform1f(locs.uCurv, CRT.curvature);
  gl.uniform1f(locs.uScan, CRT.scanline);
  gl.uniform1f(locs.uMask, CRT.mask);
  gl.uniform1f(locs.uRgb,  CRT.rgbShift);
  gl.uniform1f(locs.uBloom,CRT.bloom);
  gl.uniform1f(locs.uFlicker,CRT.flicker);
  gl.uniform1f(locs.uNoise,CRT.noise);
  gl.uniform1f(locs.uGlow, CRT.glowLine);
  gl.uniform1f(locs.uVig,  CRT.vignette);
  gl.uniform1f(locs.uBright,CRT.brightness);
  gl.uniform1f(locs.uMono, CRT.mono ? 1.0 : 0.0);
  gl.uniform3fv(locs.uTint, CRT.monoTint);
  gl.uniform1f(locs.uPower, CRT.power);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}
function drawFallback(){
  const g = out.getContext("2d");
  if(!g) return;
  g.imageSmoothingEnabled = false;
  g.drawImage(content, 0, 0, out.width, out.height);
}

/* ============================================================================
   AUDIO  — one shared context + analyser; engine dispatch by extension
   ========================================================================== */
let actx, analyser, freqData, masterGain;
let sidPlayer = null;          // jsSID instance
let gmeReady = false, GME = null, gmeApi = null;
let current = { stop(){} };    // teardown of the active engine
let volume = 0.7;

function initAudio(){
  actx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = actx.createAnalyser();
  analyser.fftSize = 512; analyser.smoothingTimeConstant = 0.78;
  freqData = new Uint8Array(analyser.frequencyBinCount);
  masterGain = actx.createGain(); masterGain.gain.value = volume;
  analyser.connect(masterGain); masterGain.connect(actx.destination);
}

/* try to load the GME wasm module if it has been built */
function loadGME(){
  return new Promise(res => {
    const s = document.createElement("script");
    s.src = "assets/engines/libgme.js";
    s.onerror = () => res(false);
    s.onload = () => {
      if(typeof createGME !== "function") return res(false);
      createGME().then(mod => {
        GME = mod;
        gmeApi = {
          open:  mod.cwrap("gme_open_data","number",["number","number","number","number"]),
          start: mod.cwrap("gme_start_track","number",["number","number"]),
          play:  mod.cwrap("gme_play","number",["number","number","number"]),
          ended: mod.cwrap("gme_track_ended","number",["number"]),
          fade:  mod.cwrap("gme_set_fade","number",["number","number"]),
          del:   mod.cwrap("gme_delete",null,["number"]),
        };
        gmeReady = true; res(true);
      }).catch(()=>res(false));
    };
    document.head.appendChild(s);
  });
}

async function fetchBytes(url){
  const r = await fetch(url);
  const buf = new Uint8Array(await r.arrayBuffer());
  // gzipped VGM (.vgz) → inflate in-browser so GME gets raw VGM (no zlib build).
  // Detect by magic bytes so it also works for blob: URLs from local files.
  if(buf[0]===0x1f && buf[1]===0x8b){
    const ds = new DecompressionStream("gzip");
    const ab = await new Response(new Blob([buf]).stream().pipeThrough(ds)).arrayBuffer();
    return new Uint8Array(ab);
  }
  return buf;
}

/* ---- per-format players ------------------------------------------------- */
async function playNative(url){       // mp3 / flac / wav
  const data = await (await fetch(url)).arrayBuffer();
  const audioBuf = await actx.decodeAudioData(data);
  const src = actx.createBufferSource();
  src.buffer = audioBuf; src.connect(analyser); src.start();
  src.onended = onTrackEnd;
  return { stop(){ try{ src.onended=null; src.stop(); }catch(e){} } };
}

async function playSID(url, durationSec){
  if(!sidPlayer) sidPlayer = new jsSID(16384, 0.0005, actx);
  sidPlayer._dest = analyser;
  sidPlayer.setendcallback(onTrackEnd, durationSec || 150);
  sidPlayer.loadstart(url, 0);
  return { stop(){ try{ sidPlayer.setendcallback(null,0); sidPlayer.pause(); }catch(e){} } };
}

async function playGME(url){
  const bytes = await fetchBytes(url);
  const dataPtr = GME._malloc(bytes.length);
  GME.HEAPU8.set(bytes, dataPtr);
  const outPtr = GME._malloc(4);
  const err = gmeApi.open(dataPtr, bytes.length, outPtr, actx.sampleRate);
  if(err){ GME._free(dataPtr); GME._free(outPtr); throw new Error("gme_open: "+GME.UTF8ToString(err)); }
  const emu = GME.getValue(outPtr, "i32");
  GME._free(outPtr); GME._free(dataPtr);
  gmeApi.start(emu, 0);
  gmeApi.fade(emu, 165000);                 // gentle fade if it runs long

  const FR = 4096;
  const node = actx.createScriptProcessor(FR, 0, 2);
  const sbuf = GME._malloc(FR * 2 * 2);     // FR frames * 2ch * int16
  let dead = false, logged = false;
  node.onaudioprocess = (e) => {
    const L = e.outputBuffer.getChannelData(0), R = e.outputBuffer.getChannelData(1);
    if(dead || gmeApi.ended(emu)){ L.fill(0); R.fill(0); if(!dead){ dead=true; onTrackEnd(); } return; }
    try {
      gmeApi.play(emu, FR * 2, sbuf);
      const h = GME.HEAP16, base = sbuf >> 1;
      for(let i=0;i<FR;i++){ L[i]=h[base+i*2]/32768; R[i]=h[base+i*2+1]/32768; }
      if(DEBUG && !logged){ logged = true; let pk=0; for(let i=0;i<128;i++) pk=Math.max(pk,Math.abs(L[i])); console.log("GME first-block peak:", pk.toFixed(3)); }
    } catch(err){ if(!logged){ logged=true; console.error("GME play error:", err); } L.fill(0); R.fill(0); }
  };
  node.connect(analyser);
  return { stop(){ dead=true; try{ node.disconnect(); }catch(e){} gmeApi.del(emu); GME._free(sbuf); } };
}

/* ============================================================================
   PLAYLIST / SEQUENCING  (mirrors the radio: random pick + new scheme/char)
   ========================================================================== */
let playlist = [];
let playIndex = -1;
let shuffle = true;            // bundled demo behaves like the radio (random)
let localMode = false;         // true once the user loads their own files
let lastBlobURL = null;
const history = [];
let state = { source:"RANDOM", id:"—", platform:"", game:"booting…", track:"—",
              scheme:"minerva", char:"#", queue:0 };
let advancing = false, paused = false;

function rollLook(){
  state.scheme = SCHEME_NAMES[(Math.random()*SCHEME_NAMES.length)|0];
  state.char   = VIS_CHARS[(Math.random()*VIS_CHARS.length)|0];
}

async function playEntry(entry){
  try{ current.stop(); }catch(e){}
  if(lastBlobURL){ URL.revokeObjectURL(lastBlobURL); lastBlobURL = null; }
  rollLook();
  state.source = localMode ? "LOCAL" : "RANDOM";
  state.id = entry.id; state.platform = entry.platform;
  state.game = entry.game; state.track = entry.track;
  let url = entry.url || ("assets/tracks/" + entry.file);
  if(entry.fileObj){ url = lastBlobURL = URL.createObjectURL(entry.fileObj); }
  if(DEBUG) console.log("▶ play", entry.format, "|", entry.track, "| gmeReady:", gmeReady, "| ctx:", actx && actx.state);
  try{
    switch(entry.format){
      case "sid": current = await playSID(url, 150); break;
      case "spc": case "vgm": case "vgz":
        if(!gmeReady){ state.track = "(loading GME…) " + entry.track; await loadGME(); }
        if(gmeReady) current = await playGME(url);
        else { state.track = "(GME unavailable) " + entry.track; scheduleSkip(); }
        break;
      case "mp3": case "flac": case "wav": current = await playNative(url); break;
      default: console.warn("no engine for ." + entry.format); scheduleSkip();
    }
  }catch(err){
    console.warn("playback failed:", entry.file, err);
    state.track = "⚠ " + entry.track;
    scheduleSkip();
  }
}
function scheduleSkip(){ setTimeout(onTrackEnd, 2500); }

function onTrackEnd(){
  if(advancing) return; advancing = true;
  setTimeout(()=>{ advancing=false; next(); }, 50);
}
function pickIndex(dir){
  if(shuffle) return (Math.random()*playlist.length)|0;
  if(playIndex < 0) return 0;
  return (playIndex + dir + playlist.length) % playlist.length;
}
function next(){
  if(!playlist.length) return;
  if(playIndex >= 0) history.push(playIndex);
  playIndex = pickIndex(1);
  playEntry(playlist[playIndex]);
}
function prev(){
  if(!playlist.length) return;
  if(shuffle && history.length) playIndex = history.pop();
  else playIndex = pickIndex(-1);
  playEntry(playlist[playIndex]);
}
function togglePause(){
  if(!actx) return;
  paused = !paused;
  if(paused) actx.suspend(); else actx.resume();
}

/* ---- local-player edition: load the user's own files -------------------- */
const PLAYABLE = ["sid","spc","vgm","vgz","mp3","flac","wav"];
function entriesFromFiles(files){
  const out = [];
  for(const f of files){
    const path = f.webkitRelativePath || f.name;
    const parts = path.split("/");
    const name = parts[parts.length-1];
    const dot = name.lastIndexOf(".");
    const ext = dot>=0 ? name.slice(dot+1).toLowerCase() : "";
    if(!PLAYABLE.includes(ext)) continue;
    out.push({
      id: "LOCAL",
      platform: parts.length>2 ? parts[0] : "",
      game: parts.length>=2 ? parts[parts.length-2].replace(/_/g," ") : "",
      track: dot>=0 ? name.slice(0,dot) : name,
      fileObj: f, format: ext,
    });
  }
  return out;
}
function loadLocal(fileList){
  const e = entriesFromFiles(fileList);
  if(!e.length){ console.warn("No playable files (sid/spc/vgm/vgz/mp3/flac/wav) in selection."); return; }
  playlist = e; localMode = true; shuffle = false; playIndex = -1; history.length = 0;
  console.log("Loaded " + e.length + " local track(s).");
  if(actx) next();          // if powered on, start now; else POWER ON will
}

/* ============================================================================
   MAIN LOOP
   ========================================================================== */
let powerStart = -1;            // timestamp when POWER ON was clicked
let lastDiag = 0;               // throttle for the audio diagnostic log
const POWER_MS = 666;           // ignition duration
function frame(time){
  // CRT tube ignition (dot → line → fill)
  if(powerStart >= 0 && CRT.power < 1){
    const T = (time - powerStart) / POWER_MS;
    CRT.power = T >= 1 ? 1 : T;
  }
  // audio → spectrum (idle shimmer if nothing is actually playing)
  let realAvg = -1;
  if(analyser){
    analyser.getByteFrequencyData(freqData);
    realAvg = 0; for(let i=0;i<freqData.length;i++) realAvg += freqData[i];
    realAvg /= freqData.length;
  } else { freqData = freqData || new Uint8Array(256); }
  if(realAvg <= 0){
    for(let i=0;i<freqData.length;i++){
      freqData[i] = 40 + 30*Math.abs(Math.sin(i*0.15 + time*0.002)) * Math.max(0, 1 - i/freqData.length);
    }
  }
  if(DEBUG && analyser && time - lastDiag > 2000){
    lastDiag = time;
    console.log("audio:", realAvg>0 ? ("PLAYING avg="+realAvg.toFixed(1)) : "SILENT — no samples reaching the analyser");
  }
  ticker.update(time);

  // compose the screen
  cx.fillStyle = "#000"; cx.fillRect(0,0,VW,VH);
  drawNowPlaying(state);
  drawVisualiser(freqData, state.scheme, state.char);
  ticker.draw();

  if(glOK) drawGL(time); else drawFallback();
  requestAnimationFrame(frame);
}

/* ============================================================================
   BOOT
   ========================================================================== */
async function boot(){
  try { glOK = initGL(); } catch(e){ console.warn("WebGL init failed, using 2D fallback:", e); glOK = false; }
  ticker.reroll(performance.now());

  // load the bundled playlist if present (public build ships none — bring your own)
  try {
    playlist = await (await fetch("assets/tracks/tracks.json")).json();
  } catch(e){ playlist = []; }
  if(!Array.isArray(playlist) || !playlist.length){
    playlist = [];
    state.platform = "MiNERVA-FM";
    state.game = "Local Player";
    state.track = "press [O] to load a folder · or drop files onto the screen";
    state.id = "—";
  }
  requestAnimationFrame(frame);

  // power-on (required: AudioContext needs a user gesture)
  const power = document.getElementById("power");
  const start = async () => {
    powerStart = performance.now();   // begin tube ignition
    power.remove();                   // reveal the igniting screen immediately
    initAudio();
    await actx.resume();
    if(DEBUG) console.log("AudioContext:", actx.state, "@", actx.sampleRate, "Hz");
    await loadGME();              // enables SPC/VGM if the build exists
    if(DEBUG) console.log("GME ready:", gmeReady);
    next();
  };
  power.addEventListener("click", start, { once:true });

  // local-player: drag files onto the tube, or press [O] to open a folder
  const stage = document.getElementById("stage");
  ["dragenter","dragover"].forEach(ev => stage.addEventListener(ev, e => e.preventDefault()));
  stage.addEventListener("drop", e => { e.preventDefault(); if(e.dataTransfer.files.length) loadLocal(e.dataTransfer.files); });
  const folderInput = document.createElement("input");
  folderInput.type = "file"; folderInput.webkitdirectory = true; folderInput.multiple = true;
  folderInput.style.display = "none";
  folderInput.addEventListener("change", () => loadLocal(folderInput.files));
  document.body.appendChild(folderInput);

  // keyboard
  addEventListener("keydown", (e) => {
    if(e.key === "n" || e.key === "N") next();
    else if(e.key === "p" || e.key === "P") prev();
    else if(e.key === " ") { e.preventDefault(); togglePause(); }
    else if(e.key === "o" || e.key === "O") folderInput.click();
    else if(e.key === "m" || e.key === "M") CRT.mono = !CRT.mono;
    else if(e.key === "s" || e.key === "S") CRT.scanline = CRT.scanline > 0 ? 0 : 0.30;
    else if(e.key === "ArrowUp"){ volume=Math.min(1,volume+0.05); if(masterGain) masterGain.gain.value=volume; }
    else if(e.key === "ArrowDown"){ volume=Math.max(0,volume-0.05); if(masterGain) masterGain.gain.value=volume; }
  });
}
boot();
</script>
